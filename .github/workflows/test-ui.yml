name: UI Tests (Playwright)
run-name: UI Tests [${{ inputs.environment }}] ${{ inputs.custom_suites != '' && inputs.custom_suites || inputs.suite }}

# Run UI tests with Playwright for the Elitea platform
#
# Usage Examples:
#   1. Run all UI tests:
#      suite: all
#
#   2. Run specific suite:
#      suite: chat (or agents, pipelines, smoke, toolkits)
#
#   3. Run custom suites (comma-separated):
#      custom_suites: chat,agents,smoke
#      (custom_suites takes priority over suite dropdown)
#
#   4. Combine suite and markers:
#      suite: chat
#      markers: p0 or p1
#
# Artifacts Generated:
#   - HTML report (reports/report.html) - Full logs, durations, environment
#   - JUnit XML (reports/junit.xml) - CI/CD compatible results
#   - Failure screenshots (*FAIL*.png) - Only for failed tests
#   - Error screenshots (*ERROR*.png) - Only for errored tests
#
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - stage2
          - stage3
          - next
          - custom
        default: dev
      custom_environment:
        description: 'Custom environment name (used only when environment=custom). Requires secrets: ELITEA_URL_<NAME>, ELITEA_API_TOKEN_<NAME>, ELITEA_PROJECT_ID_<NAME>, TEST_USER_EMAIL_<NAME>, TEST_USER_PASSWORD_<NAME>'
        required: false
        type: string
        default: ''
      suite:
        description: 'Test suite to run'
        required: true
        type: choice
        options:
          - all
          - agents
          - chat
          - pipelines
          - smoke
          - support_assistant
          - toolkits
        default: all
      custom_suites:
        description: 'Custom suites (comma-separated, e.g., "chat,agents"). Takes priority over suite dropdown if provided.'
        required: false
        type: string
        default: ''
      markers:
        description: 'Pytest markers (e.g., p0, smoke, "p0 or p1")'
        required: false
        default: ''

jobs:
  ui-tests:
    name: UI Tests [${{ inputs.environment }}] ${{ inputs.custom_suites != '' && inputs.custom_suites || inputs.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve environment name
        run: |
          if [ "${{ inputs.environment }}" = "custom" ]; then
            ENV_NAME="${{ inputs.custom_environment }}"
          else
            ENV_NAME="${{ inputs.environment }}"
          fi
          echo "ENV_UPPER=$(echo "$ENV_NAME" | tr '[:lower:]' '[:upper:]')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest-rerunfailures
          pip install -e ".[reporting]"

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run UI tests
        working-directory: automation
        env:
          HEADLESS: true
          # Environment-specific secrets — resolved by selected environment
          ELITEA_URL: ${{ secrets[format('ELITEA_URL_{0}', env.ENV_UPPER)] }}
          ELITEA_API_BASE: ${{ secrets[format('ELITEA_API_BASE_{0}', env.ENV_UPPER)] }}
          ELITEA_API_TOKEN: ${{ secrets[format('ELITEA_API_TOKEN_{0}', env.ENV_UPPER)] }}
          ELITEA_PROJECT_ID: ${{ secrets[format('ELITEA_PROJECT_ID_{0}', env.ENV_UPPER)] }}
          TEST_USER_EMAIL: ${{ secrets[format('TEST_USER_EMAIL_{0}', env.ENV_UPPER)] }}
          TEST_USER_PASSWORD: ${{ secrets[format('TEST_USER_PASSWORD_{0}', env.ENV_UPPER)] }}
          # Shared toolkit secrets — same across all environments
          GIT_HUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          ADO_TOKEN: ${{ secrets.ADO_TOKEN }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_API_KEY: ${{ secrets.CONFLUENCE_API_KEY }}
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          ZEPHYR_API_KEY: ${{ secrets.ZEPHYR_API_KEY }}
          ZEPHYR_ESENTIALS_KEY: ${{ secrets.ZEPHYR_ESENTIALS_KEY }}
          GITLAB_PRIVATE_TOKEN: ${{ secrets.GITLAB_PRIVATE_TOKEN }}
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        run: |
          # Build pytest command
          PYTEST_CMD="pytest"

          # Determine test paths from suite selection
          # custom_suites takes priority over suite dropdown
          CUSTOM_SUITES="${{ inputs.custom_suites }}"
          SUITE="${{ inputs.suite }}"

          if [ -n "$CUSTOM_SUITES" ]; then
            # Parse comma-separated custom suites
            TEST_PATHS=""
            IFS=',' read -ra SUITES <<< "$CUSTOM_SUITES"
            for s in "${SUITES[@]}"; do
              s=$(echo "$s" | xargs)  # trim whitespace
              TEST_PATHS="$TEST_PATHS tests/ui/$s/"
            done
          elif [ "$SUITE" = "all" ]; then
            TEST_PATHS="tests/ui/"
          else
            TEST_PATHS="tests/ui/$SUITE/"
          fi

          PYTEST_CMD="$PYTEST_CMD $TEST_PATHS"

          # Add markers if specified
          MARKERS="${{ inputs.markers }}"
          if [ -n "$MARKERS" ]; then
            PYTEST_CMD="$PYTEST_CMD -m \"$MARKERS\""
          fi

          # Add standard flags
          PYTEST_CMD="$PYTEST_CMD -v --tb=short"

          # Run tests
          echo "Running: $PYTEST_CMD"
          eval $PYTEST_CMD

      - name: Generate test summary
        if: always()
        working-directory: automation
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse JUnit XML for results
          if [ -f "reports/junit.xml" ]; then
            # Extract test counts from XML
            TOTAL=$(grep -o 'tests="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            SKIPPED=$(grep -o 'skipped="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))

            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔥 Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # List failed tests
            if [ $FAILURES -gt 0 ] || [ $ERRORS -gt 0 ]; then
              echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              grep -A 3 'outcome="failed"\|outcome="error"' reports/junit.xml | grep 'classname\|name' | sed 's/.*name="\([^"]*\)".*/- `\1`/' >> $GITHUB_STEP_SUMMARY || echo "See artifacts for details" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            automation/reports/report.html
            automation/reports/junit.xml
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: automation/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore
