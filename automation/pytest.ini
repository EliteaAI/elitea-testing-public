[pytest]
# Elitea Testing - Pytest Configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Retry flaky tests disabled (enable by adding: --reruns N --reruns-delay N)
# Individual tests can override via @pytest.mark.flaky(reruns=N, reruns_delay=N).
# Reports: JUnit XML + HTML paths set in conftest.py (ensures correct directory)
addopts = -v --tb=short --alluredir=reports/allure-results

# HTML report (add manually or via environment):
# pytest --html=reports/report.html --self-contained-html
# Or set PYTEST_ADDOPTS="--html=reports/report.html --self-contained-html"

# Markers
markers =
    p0: Priority 0 (critical) tests
    p1: Priority 1 (high) tests
    p2: Priority 2 (medium) tests
    p3: Priority 3 (low) tests
    smoke: Smoke tests — fast critical path validation (<5 min runtime)
    regression: Regression tests — full coverage
    api: API-only tests (no browser)
    ui: UI tests (require browser)
    agents: Agent-related tests
    datasources: Datasource-related tests
    prompts: Prompt-related tests
    toolkit: Toolkit integration tests
    toolkits: Toolkit integration tests (plural alias)
    credentials: Credential management tests
    pipelines: Pipeline-related tests
    chat: Chat-related tests
    slow: Slow tests (e.g., image generation)
    support_assistant: Support Assistant chatbot widget tests
    voice: Voice configuration and TTS tests
